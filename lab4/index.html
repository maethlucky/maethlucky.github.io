<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 4: Sign Up Form</title>
    <script src="js/script.js" defer></script>
    <link href="css/styles.css" type="text/css" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <h1> Sign Up Form </h1>

    <fieldset>
        <legend>Sign Up</legend>
        First Name: <input type="text"><br>
        Last Name: <input type="text"><br>
        Email: <input type="text"><br>
        Phone Number: <input type="text"><br><br>
        Zip Code: <input id="zipcode" type="text">
        <span id="zipNotFound"></span><br>

        City: <span id="city"></span>
        <br>
        Latitude: <span id="latitude"></span>
        <br>
        Longitude: <span id="longitude"></span>
        <br>
        State: <select id="state">
            <option value="" disabled selected hidden>Select one</option>
        </select><br>
        Select a County: <select id="county"></select><br>

        Desired Username: <input type="text" id="username">
        <span id="nameAvailable"></span><br>

        Password: <input type="password" id="password">
        <span id="suggestPassword"></span><br>

        Type Password Again: <input type="password" id="confirmPassword"><br>
        <input type="submit" value="Sign up!" id="submitBtn">

        <div id="submissionErrors"></div>
    </fieldset>
</body>

</html>
